version: '3.8'

services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-livechat}
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD:-rootpassword}@mysql:3306/${MYSQL_DATABASE:-livechat}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key}
      - PORT=3001
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - WIDGET_URL=${WIDGET_URL:-http://localhost:5174}
    depends_on:
      - mysql

  dashboard:
    build:
      context: ./dashboard
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3001}
        - VITE_WS_URL=${VITE_WS_URL:-http://localhost:3001}
        - VITE_WIDGET_URL=${VITE_WIDGET_URL:-http://localhost:5174}
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  widget:
    build:
      context: ./widget
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3001}
        - VITE_WS_URL=${VITE_WS_URL:-http://localhost:3001}
    restart: always
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  mysql_data:
