server {
    listen 80;
    server_name localhost;

    # Only files from the shared uploads volume are exposed.
    location /uploads/ {
        alias /var/media/uploads/;
        autoindex off;
        try_files $uri =404;

        default_type application/octet-stream;
        types {
            image/jpeg jpg jpeg;
            image/png png;
            image/webp webp;
            image/gif gif;
            application/pdf pdf;
        }

        set $content_disposition "attachment";
        if ($request_uri ~* "\.(jpg|jpeg|png|webp|gif)$") {
            set $content_disposition "inline";
        }

        add_header Content-Disposition $content_disposition always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        return 404;
    }
}
